background yes
use_xft yes
xftfont Terminus:size=8
xftalpha 1
# update_interval 0.25
# update_interval 3
update_interval 5
total_run_times 0

own_window yes
own_window_type override
own_window_transparent yes
own_window_class Conky
own_window_argb_visual yes
own_window_argb_value 0
own_window_type normal
# own_window_colour LightSkyBlue
own_window_hints undecorated,below,sticky,skip_taskbar,skip_pager

double_buffer yes
minimum_size 200 200
maximum_width 200
draw_shades yes
draw_outline no
draw_borders no
draw_graph_borders yes
default_color white
default_shade_color black
default_outline_color white
alignment top_right
gap_x 70
gap_y 40
no_buffers yes
uppercase no
cpu_avg_samples 2
override_utf8_locale yes

color0 ffffff  # tampilan nilai
color1 99ffff  # judul
color2 ffaaff  # grafik swap
color3 ffcc99  # grafik graph
color4 orange  # investigasi
color5 red     # Kritis
color6 d8d8d8  # Tampilan nilai
color7 green   # Teks khusus
color8 00bbff  # IGOS Nusantara

TEXT
${font sans-serif:bold:size=12}${color8}IGOS Nusantara${alignr}2026
${font sans-serif:normal:size=8}${color0}${time %a, %e %B %G}${alignr}${time %R:%S}
${if_existing /sys/class/power_supply/BAT1/uevent}${if_match ${battery_percent BAT1} > 0}Baterai: ${battery_percent BAT1} %${alignr}${execi 60 cat /proc/acpi/battery/BAT1/state | awk '{if ($0 ~ "present rate:"){rate = $3} if($0 ~ "remaining capacity:"){cap = $3}} END {printf "%d jam %d menit\n" ,(cap / rate), (((cap % rate) / rate) * 60)}'}${endif}${else}${voffset -15}${endif}
${if_existing /sys/class/power_supply/BAT0/uevent}${if_match ${battery_percent BAT0} > 0}Baterai: ${battery_percent BAT0} %${alignr}${execi 60 cat /proc/acpi/battery/BAT0/state | awk '{if ($0 ~ "present rate:"){rate = $3} if($0 ~ "remaining capacity:"){cap = $3}} END {printf "%d jam %d menit\n" ,(cap / rate), (((cap % rate) / rate) * 60)}'}${endif}${else}${voffset -15}${endif}

